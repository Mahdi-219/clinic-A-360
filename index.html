<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سستم جدول حالات العيادة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #16a085; --danger-color: #c0392b; --success-color: #27ae60; --bg-color: #f8f9fa; --card-bg: #ffffff; --border-color: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: #333; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1050px; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 30px; }
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--accent-color); padding-bottom: 15px; }
        .status-bar { display: flex; justify-content: space-between; background: #edf2f7; padding: 12px 20px; border-radius: 8px; margin-bottom: 25px; font-weight: bold; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; }
        .btn-primary { background-color: var(--accent-color); color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .cases-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .case-card { border: 1px solid var(--border-color); padding: 15px; text-align: center; border-radius: 8px; }
        .counter-controls { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 10px; }
        .btn-counter { width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; }
        .admin-panel { display: none; margin-top: 25px; background: #fff3cd; padding: 20px; border-radius: 8px; }
        .monthly-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .monthly-table th, .monthly-table td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>سستم جدول حالات العيادة</h1></header>
    <div class="status-bar"><span id="statusText">بانتظار تسجيل الدخول...</span><span id="activeUserDisplay"></span></div>
    
    <div id="loginScreen">
        <div class="form-grid">
            <select id="loginShift"><option value="شفت الف صباحي">شفت الف صباحي</option><option value="حساب مسؤول">حساب مسؤول</option></select>
            <input type="number" id="loginEmpId" placeholder="الرقم الوظيفي">
            <input type="password" id="loginPin" placeholder="الرمز السري">
        </div>
        <button class="btn-primary" onclick="handleLogin()">تسجيل الدخول</button>
    </div>

    <div id="mainDashboard" style="display: none;">
        <div class="cases-grid">
            <div class="case-card"><div>الحالات المرضية</div><div class="counter-controls"><button class="btn-counter" onclick="updateCounter('sick_cases', -1)">-</button><span id="sick_cases">0</span><button class="btn-counter" onclick="updateCounter('sick_cases', 1)">+</button></div></div>
        </div>
        <button class="btn-primary" onclick="submitData()">💾 حفظ البيانات</button>
        <div id="adminPanel" class="admin-panel">
            <table class="monthly-table" id="monthlyDataTable"><thead><tr><th>اليوم</th><th>الحالات</th></tr></thead><tbody id="monthlyTableBody"></tbody></table>
            <button class="btn-primary" onclick="printMonthlyPDF()">🖨️ طباعة PDF</button>
        </div>
        <button class="btn-primary" style="background-color: #7f8c8d;" onclick="location.reload()">تسجيل الخروج</button>
    </div>
</div>

<script>
    // الرابط الجديد الخاص بك
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxvCq1QjBt8Pr-2d-0Td5btKVlqjU4qm3hph5qLamBfF1PkLdfRPghKBt4aVpvMJdpp/exec';
    let currentData = { sick_cases: 0 };
    let loggedInUser = { empId: '', shift: '' };

    function handleLogin() {
        const empId = document.getElementById('loginEmpId').value;
        const pin = document.getElementById('loginPin').value;
        const shift = document.getElementById('loginShift').value;

        if (shift === "حساب مسؤول" && empId === "1111" && pin === "1111") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'block';
            return;
        }
        // إضافة منطق الدخول لباقي الموظفين هنا
        alert("تم الدخول (تجريبي)");
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
    }

    function updateCounter(field, val) {
        currentData[field] = Math.max(0, currentData[field] + val);
        document.getElementById(field).innerText = currentData[field];
    }

    function submitData() {
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "SYNC_DATA", ...currentData, emp_id: loggedInUser.empId }) })
        .then(() => alert("تم الحفظ بنجاح!"));
    }
</script>
</body>
</html>
