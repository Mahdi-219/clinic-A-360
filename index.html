<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>سستم العيادة المطور</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; direction: rtl; text-align: right; background-color: #f4f6f9; padding: 20px; }
    .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 auto; }
    h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
    select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
    .counter-container { display: flex; align-items: center; justify-content: space-between; background: #ecf0f1; padding: 10px; border-radius: 4px; }
    .btn-counter { width: 45%; padding: 10px; font-size: 20px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: white; }
    .btn-plus { background-color: #2ecc71; }
    .btn-minus { background-color: #e74c3c; }
    .count-display { font-size: 24px; font-weight: bold; width: 10%; text-align: center; }
    .status { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; font-weight: bold; text-align: center; }
    .success { background-color: #d4edda; color: #155724; }
    .error { background-color: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

<div class="container">
  <h2>لوحة تسجيل حالات العيادة</h2>
  
  <!-- اختيار الشفت والحساب -->
  <div class="form-group">
    <label>الشفت الحالي:</label>
    <select id="shiftSelect">
      <option value="Shift_A_Morning">شفت أ - صباحي</option>
      <option value="Shift_A_Night">شفت أ - مسائي</option>
      <option value="Shift_B_Morning">شفت ب - صباحي</option>
      <option value="Shift_B_Night">شفت ب - مسائي</option>
      <option value="Shift_C_Morning">شفت ج - صباحي</option>
      <option value="Shift_C_Night">شفت ج - مسائي</option>
      <option value="Admin">حساب المسؤول (صلاحيات كاملة)</option>
    </select>
  </div>

  <!-- نوع الحالة (إضافة خيار حالات طبية وقسم الحروق) -->
  <div class="form-group">
    <label>نوع الحالة الطبية:</label>
    <select id="caseTypeSelect" onchange="toggleDepartments()">
      <option value="حالات طبية">حالات طبية عادية</option>
      <option value="حروق">قسم الحروق (Burn)</option>
      <option value="طوارئ">حالات طوارئ حرجة</option>
    </select>
  </div>

  <!-- القسم الفرعي للحروق أو غيرها -->
  <div class="form-group" id="deptGroup" style="display:none;">
    <label>التصنيف الفرعي للحروق:</label>
    <select id="deptSelect">
      <option value="Burn_1st">حروق من الدرجة الأولى</option>
      <option value="Burn_2nd">حروق من الدرجة الثانية</option>
      <option value="Burn_3rd">حروق من الدرجة الثالثة</option>
    </select>
  </div>

  <!-- التحكم في العداد وزر الزائد والناقص -->
  <div class="form-group">
    <label>عدد الحالات المراد إدخالها:</label>
    <div class="counter-container">
      <button class="btn-counter btn-minus" onclick="changeCount(-1)">-</button>
      <span class="count-display" id="countVal">1</span>
      <button class="btn-counter btn-plus" onclick="changeCount(1)">+</button>
    </div>
  </div>

  <button onclick="submitData()" style="width:100%; background-color:#3498db; color:white; border:none; padding:12px; font-size:18px; border-radius:4px; cursor:pointer; font-weight:bold;">تأكيد وحفظ البيانات</button>

  <div id="statusBox" class="status"></div>
</div>

<script>
  let currentCount = 1;

  // دالة التحكم بزر الزائد والناقص بدقة
  function changeCount(amount) {
    currentCount += amount;
    if (currentCount < 1) currentCount = 1; // منع الأعداد السلبية
    document.getElementById('countVal').innerText = currentCount;
  }

  // إظهار وإخفاء أقسام الحروق بناء على الاختيار
  function toggleDepartments() {
    let caseType = document.getElementById('caseTypeSelect').value;
    let deptGroup = document.getElementById('deptGroup');
    if (caseType === 'حروق') {
      deptGroup.style.display = 'block';
    } else {
      deptGroup.style.display = 'none';
    }
  }

  // دالة الحفظ التلقائي والفوري وإرسال البيانات للسيرفر
  function submitData() {
    let statusBox = document.getElementById('statusBox');
    statusBox.style.display = 'block';
    statusBox.className = 'status';
    statusBox.innerText = 'جاري الحفظ التلقائي والاتصال بالسيرفر...';

    let data = {
      shift: document.getElementById('shiftSelect').value,
      caseType: document.getElementById('caseTypeSelect').value,
      department: document.getElementById('caseTypeSelect').value === 'حروق' ? document.getElementById('deptSelect').value : '-',
      count: currentCount
    };

    // الاتصال الفوري بالسيرفر لمنع مشكلة عدم الاتصال القديمة
    google.script.run
      .withSuccessHandler(function(response) {
         if(response.success) {
           statusBox.className = 'status success';
           statusBox.innerText = response.message;
           currentCount = 1; // إعادة تصفير العداد بعد النجاح
           document.getElementById('countVal').innerText = currentCount;
         } else {
           statusBox.className = 'status error';
           statusBox.innerText = response.message;
         }
      })
      .withFailureHandler(function(err) {
         statusBox.className = 'status error';
         statusBox.innerText = 'فشل الاتصال بالسيرفر! تم تفعيل وضع الحفظ الاحتياطي.';
      })
      .saveDataAutomatically(data);
  }
</script>

</body>
</html>
